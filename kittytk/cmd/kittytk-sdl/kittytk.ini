; kittytk.ini - configuration for the KittyTK display host.
;
; Edit this file in a text editor (e.g. Notepad), save, then relaunch
; kittytk-sdl.exe. No command line needed.
;
; The host uses the first kittytk.ini it finds, in this order:
;   1. the folder you run it from
;   2. the folder holding kittytk-sdl.exe   <- this file
;   3. your user config folder (%APPDATA%\kittytk on Windows)
;
; Lines starting with ; or # are comments. Section headers ([window],
; [service]) are just for tidiness - the settings work with or without them.

[window]
; Window title bar text.
title  = KittyTK
; Window size in pixels.
width  = 1024
height = 768
; Pixels per unit: 1 = small, 2 = crisp and larger. Try 1 on small screens.
scale  = 2
; UI font point size. Sizes the whole desktop's cell grid: larger makes
; text and text-sized controls bigger (12 = default). This is independent
; of scale - scale is pixel density, font_size is the type size.
font_size = 12
; Graphical window frame border thickness, in device pixels. The border
; is drawn AND reserved outside the window's interior, so a thicker border
; makes the usable content area smaller (or needs a bigger window). Blank
; or 0 keeps the default thin frame.
border_width =
; Show the render frame rate in the OS title bar (kittytk-sdl only).
;   true  -> append " - N fps" to the window title, updated once a second.
;            This runs a continuous repaint (burn) loop so the reading is a
;            steady, vsync-paced rate (usually the monitor refresh) - handy
;            for measurement, but it uses CPU/GPU even when the desktop is idle.
;   blank -> off (default). The desktop repaints only on change, no burn loop.
fps =
; Sync presents to the display refresh. On by default (smooth, no tearing,
; caps the frame rate at the monitor refresh). Set false to uncap - with
; fps=true this lets the reading climb past the refresh to show raw throughput.
vsync =

[service]
; Where the display host listens for applications.
;   blank            -> the recommended default (loopback TCP on Windows,
;                       a local socket elsewhere)
;   tcp://0.0.0.0:9797 -> plaintext TCP on all interfaces (LAN; no encryption)
;   tls://0.0.0.0:9797 -> encrypted TCP (fingerprint-pinned)
; The KITTYTK_DISPLAY environment variable, if set, overrides this.
endpoint =
; Optional shared secret that lets a client connect without a prompt.
; The KITTYTK_TOKEN environment variable, if set, overrides this.
token =

[system]
; Menu shortcut style for the graphical host (kittytk-sdl).
;   true  -> native macOS glyphs (⌃⌥⇧⌘, ordered ⌃⌥⇧⌘) when running ON macOS
;   mac   -> force the native macOS glyphs on any operating system
;   blank -> the default compact notation (^X, M-x, S-Tab)
native =

[tui]
; The same knob for the terminal host (kittytk-tui), independent of [system].
native =
