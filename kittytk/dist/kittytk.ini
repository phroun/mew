[window]
title  = KittyTK
width  = 1024
height = 768
scale  = 2
font_size = 12
; Graphical window frame border thickness, in device pixels. Blank or 0
; keeps the default thin frame; raise it for a heavier window outline.
border_width =
; fps = true shows the render frame rate in the OS title bar (kittytk-sdl).
; It runs a continuous repaint (burn) loop, so the reading is a steady,
; vsync-paced rate (usually the monitor refresh) - useful for measurement, but
; it uses CPU/GPU even when idle. Blank/false = off (no burn loop).
fps =
; vsync syncs presents to the display refresh. On by default (caps fps at the
; monitor refresh). vsync = false uncaps it, so fps=true can show raw
; throughput past the refresh rate.
vsync =
[service]
endpoint =      ; blank = default; tcp://…, tls://…, or a socket path
token =

[tui]
; Terminal clipboard integration. Blank/osc52/system mirrors Copy/Cut to the
; terminal's clipboard via OSC 52 (iTerm2, xterm, kitty, tmux, …). osc52-paste
; (or full) additionally queries the terminal on Paste (read-back), falling
; back to the internal clipboard if the terminal stays silent. internal/off
; keeps a host-internal clipboard only.
clipboard =
